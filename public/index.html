<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EncomVentas — Gestión de Propuestas Comerciales</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --card: #1e1e36;
  --card-hover: #252545;
  --red: #e94560;
  --red-dark: #c23152;
  --green: #2ecc71;
  --yellow: #f1c40f;
  --blue: #3498db;
  --orange: #e67e22;
  --purple: #9b59b6;
  --text: #eee;
  --text2: #aaa;
  --text3: #666;
  --border: #2a2a4a;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { color:var(--red); text-decoration:none; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ─── Layout ─── */
.app { display:flex; min-height:100vh; }
.sidebar { width:260px; background:var(--bg2); border-right:1px solid var(--border); padding:24px 0; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; }
.main { flex:1; margin-left:260px; padding:32px; min-height:100vh; }
.sidebar-logo { padding:0 24px 24px; font-size:22px; font-weight:800; }
.sidebar-logo span { color:var(--red); }
.sidebar-subtitle { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text3); display:block; margin-top:4px; font-weight:500; }

.nav-section { padding:16px 24px 8px; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); font-weight:600; }
.nav-item { display:flex; align-items:center; gap:12px; padding:10px 24px; cursor:pointer; transition:all .2s; color:var(--text2); font-size:14px; }
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active { background:var(--bg3); color:var(--red); border-right:3px solid var(--red); }
.nav-item svg { width:18px; height:18px; flex-shrink:0; }
.nav-badge { background:var(--red); color:#fff; font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; margin-left:auto; }
.sidebar-footer { margin-top:auto; padding:16px 24px; border-top:1px solid var(--border); }
.sidebar-user { font-size:13px; color:var(--text2); }
.sidebar-user strong { color:var(--text); display:block; }
.btn-logout { margin-top:8px; font-size:12px; color:var(--text3); cursor:pointer; transition:color .2s; background:none; border:none; font-family:inherit; }
.btn-logout:hover { color:var(--red); }

/* ─── Login ─── */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.login-box { background:var(--card); padding:48px; border-radius:var(--radius); width:400px; box-shadow:var(--shadow); }
.login-box h1 { font-size:28px; margin-bottom:8px; }
.login-box h1 span { color:var(--red); }
.login-box p { color:var(--text2); margin-bottom:32px; font-size:14px; }

/* ─── Forms ─── */
.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:6px; }
.form-input, .form-select, .form-textarea {
  width:100%; padding:12px 16px; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-size:14px; font-family:inherit; transition:border-color .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--red); }
.form-textarea { resize:vertical; min-height:100px; }
.form-select { cursor:pointer; }
.form-select option { background:var(--bg2); }
.form-hint { font-size:11px; color:var(--text3); margin-top:4px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }

.checkbox-group { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.checkbox-label { display:flex; align-items:center; gap:6px; padding:8px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:13px; transition:all .2s; }
.checkbox-label:hover { border-color:var(--red); }
.checkbox-label input { display:none; }
.checkbox-label.checked { background:rgba(233,69,96,0.15); border-color:var(--red); color:var(--red); }

/* ─── Buttons ─── */
.btn { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all .2s; }
.btn-primary { background:var(--red); color:#fff; }
.btn-primary:hover { background:var(--red-dark); transform:translateY(-1px); }
.btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--red); }
.btn-success { background:var(--green); color:#fff; }
.btn-success:hover { opacity:0.9; }
.btn-warning { background:var(--orange); color:#fff; }
.btn-sm { padding:8px 16px; font-size:12px; }
.btn-lg { padding:16px 32px; font-size:16px; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-group { display:flex; gap:8px; flex-wrap:wrap; }
.btn-icon { padding:8px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:all .2s; }
.btn-icon:hover { border-color:var(--red); color:var(--red); }

/* ─── Cards ─── */
.card { background:var(--card); border-radius:var(--radius); padding:24px; border:1px solid var(--border); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.card-title { font-size:16px; font-weight:600; }

/* ─── Page headers ─── */
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; }
.page-title { font-size:28px; font-weight:700; }
.page-subtitle { color:var(--text2); font-size:14px; margin-top:4px; }

/* ─── Status badges ─── */
.badge { display:inline-flex; align-items:center; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.badge-draft { background:rgba(102,102,102,0.2); color:#999; }
.badge-generated { background:rgba(52,152,219,0.2); color:var(--blue); }
.badge-pending { background:rgba(241,196,15,0.2); color:var(--yellow); }
.badge-validated { background:rgba(155,89,182,0.2); color:var(--purple); }
.badge-sent { background:rgba(52,152,219,0.2); color:var(--blue); }
.badge-approved { background:rgba(46,204,113,0.2); color:var(--green); }
.badge-rejected { background:rgba(233,69,96,0.2); color:var(--red); }
.badge-redo { background:rgba(230,126,34,0.2); color:var(--orange); }

/* ─── Table ─── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:12px 16px; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text3); font-weight:600; border-bottom:1px solid var(--border); }
td { padding:12px 16px; border-bottom:1px solid var(--border); font-size:14px; }
tr:hover td { background:rgba(255,255,255,0.02); }
.table-link { color:var(--text); cursor:pointer; font-weight:500; transition:color .2s; }
.table-link:hover { color:var(--red); }

/* ─── Proposal variants ─── */
.variants-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:20px; margin:24px 0; }
.variant-card { background:var(--card); border:2px solid var(--border); border-radius:var(--radius); padding:24px; transition:all .3s; cursor:pointer; position:relative; }
.variant-card:hover { border-color:var(--text3); transform:translateY(-2px); }
.variant-card.selected { border-color:var(--green); box-shadow:0 0 20px rgba(46,204,113,0.15); }
.variant-tag { position:absolute; top:16px; right:16px; background:var(--bg3); padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; color:var(--text2); }
.variant-title { font-size:18px; font-weight:700; margin-bottom:8px; padding-right:80px; }
.variant-approach { color:var(--text2); font-size:13px; line-height:1.6; margin-bottom:16px; }
.variant-total { font-size:28px; font-weight:800; color:var(--red); }
.variant-total small { font-size:14px; font-weight:400; color:var(--text3); }
.variant-meta { display:flex; gap:16px; margin-top:12px; font-size:12px; color:var(--text3); }
.variant-meta span { display:flex; align-items:center; gap:4px; }
.variant-services { margin-top:16px; }
.variant-services table th { font-size:10px; padding:8px 12px; }
.variant-services table td { font-size:13px; padding:8px 12px; }

/* ─── Dashboard stats ─── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:32px; }
.stat-card { background:var(--card); border-radius:var(--radius); padding:24px; border:1px solid var(--border); }
.stat-value { font-size:32px; font-weight:800; }
.stat-label { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
.stat-card.red .stat-value { color:var(--red); }
.stat-card.green .stat-value { color:var(--green); }
.stat-card.blue .stat-value { color:var(--blue); }
.stat-card.yellow .stat-value { color:var(--yellow); }
.stat-card.purple .stat-value { color:var(--purple); }

/* ─── Alerts ─── */
.alert { padding:16px 20px; border-radius:8px; margin-bottom:16px; font-size:14px; display:flex; align-items:center; gap:12px; }
.alert-info { background:rgba(52,152,219,0.1); border:1px solid rgba(52,152,219,0.3); color:var(--blue); }
.alert-success { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); color:var(--green); }
.alert-warning { background:rgba(241,196,15,0.1); border:1px solid rgba(241,196,15,0.3); color:var(--yellow); }
.alert-error { background:rgba(233,69,96,0.1); border:1px solid rgba(233,69,96,0.3); color:var(--red); }

/* ─── Loading ─── */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { margin-top:16px; color:var(--text2); font-size:14px; }

/* ─── Empty state ─── */
.empty-state { text-align:center; padding:64px 32px; color:var(--text3); }
.empty-state svg { width:64px; height:64px; margin-bottom:16px; opacity:0.3; }
.empty-state h3 { font-size:18px; color:var(--text2); margin-bottom:8px; }

/* ─── Tabs ─── */
.tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--bg2); padding:4px; border-radius:10px; }
.tab { padding:10px 20px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text2); transition:all .2s; border:none; background:none; font-family:inherit; }
.tab:hover { color:var(--text); }
.tab.active { background:var(--red); color:#fff; }

/* ─── Modal ─── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--card); border-radius:var(--radius); padding:32px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); }
.modal h2 { font-size:20px; margin-bottom:20px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:24px; }

/* ─── Responsive ─── */
@media(max-width:768px) {
  .sidebar { display:none; }
  .main { margin-left:0; padding:16px; }
  .form-row, .form-row-3 { grid-template-columns:1fr; }
  .variants-grid { grid-template-columns:1fr; }
  .stats-grid { grid-template-columns:1fr 1fr; }
}

/* ─── Vendor chart bar ─── */
.bar-chart { display:flex; flex-direction:column; gap:12px; }
.bar-row { display:flex; align-items:center; gap:12px; }
.bar-name { width:120px; font-size:13px; color:var(--text2); text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:28px; background:var(--bg); border-radius:6px; overflow:hidden; position:relative; }
.bar-fill { height:100%; border-radius:6px; transition:width .5s ease; display:flex; align-items:center; padding:0 10px; font-size:11px; font-weight:600; color:#fff; min-width:40px; }
.bar-value { margin-left:12px; font-size:13px; font-weight:600; width:60px; text-align:right; flex-shrink:0; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════
// EncomVentas SPA
// ════════════════════════════════════════════════════════════

const API = '';
let state = {
  user: null,
  token: localStorage.getItem('ev_token'),
  view: 'dashboard',
  proposals: [],
  clients: [],
  notifications: [],
  currentProposal: null,
  dashboard: null,
  loading: false,
  error: null,
};

// ─── API helpers ────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const r = await fetch(API + path, { ...opts, headers });
  let data;
  try { data = await r.json(); } catch { throw new Error(`Error del servidor (${r.status})`); }
  if (!r.ok) throw new Error(data.error || `Error ${r.status}`);
  return data;
}

// ─── Auth ───────────────────────────────────────────────
async function login(email, password) {
  const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
  state.token = data.token;
  state.user = data.user;
  localStorage.setItem('ev_token', data.token);
  // Load data but don't let failures block login
  try { await loadData(); } catch (e) { console.warn('loadData parcial:', e.message); }
  render();
}

function logout() {
  if (state.token) {
    fetch(API + '/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + state.token, 'Content-Type': 'application/json' } }).catch(() => {});
  }
  state.token = null;
  state.user = null;
  localStorage.removeItem('ev_token');
  render();
}

async function checkAuth() {
  if (!state.token) return;
  try {
    state.user = await api('/api/auth/me');
    try { await loadData(); } catch (e) { console.warn('loadData parcial:', e.message); }
  } catch {
    state.token = null;
    state.user = null;
    localStorage.removeItem('ev_token');
  }
}

async function loadData() {
  // Load each independently so one failure doesn't break all
  try { state.proposals = await api('/api/proposals'); } catch (e) { console.warn('proposals:', e.message); state.proposals = []; }
  try { state.clients = await api('/api/clients'); } catch (e) { console.warn('clients:', e.message); state.clients = []; }
  try { state.notifications = await api('/api/notifications'); } catch (e) { console.warn('notifications:', e.message); state.notifications = []; }
  if (state.user && state.user.role === 'admin') {
    try { state.dashboard = await api('/api/dashboard'); } catch (e) { console.warn('dashboard:', e.message); state.dashboard = null; }
  }
}

// ─── Status helpers ─────────────────────────────────────
const STATUS_MAP = {
  draft: { label: 'Borrador', class: 'badge-draft' },
  generated: { label: 'Generada', class: 'badge-generated' },
  pending_validation: { label: 'Pendiente validación', class: 'badge-pending' },
  validated: { label: 'Validada', class: 'badge-validated' },
  sent: { label: 'Enviada', class: 'badge-sent' },
  approved: { label: 'Aprobada', class: 'badge-approved' },
  rejected: { label: 'Rechazada', class: 'badge-rejected' },
  redo: { label: 'Rehacer', class: 'badge-redo' },
};

function statusBadge(status) {
  const s = STATUS_MAP[status] || { label: status, class: 'badge-draft' };
  return `<span class="badge ${s.class}">${s.label}</span>`;
}

function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}

function formatMoney(n) {
  return (n || 0).toLocaleString('es-ES') + ' €';
}

// ─── RENDER ─────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.user) {
    app.innerHTML = renderLogin();
    bindEvents();
    return;
  }
  app.innerHTML = `
    <div class="app">
      ${renderSidebar()}
      <div class="main">${renderView()}</div>
    </div>
  `;
  bindEvents();
}

// ─── LOGIN ──────────────────────────────────────────────
function renderLogin() {
  return `
    <div class="login-wrap">
      <div class="login-box">
        <h1>Encom<span>Ventas</span></h1>
        <p>Gestión de propuestas comerciales con IA</p>
        <div id="login-error"></div>
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="login-email" placeholder="tu@encom.es" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-input" id="login-pass" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Iniciar sesión</button>
        </form>
      </div>
    </div>
  `;
}

// ─── SIDEBAR ────────────────────────────────────────────
function renderSidebar() {
  const isAdmin = state.user.role === 'admin';
  const pendingCount = state.notifications.length;

  return `
    <div class="sidebar">
      <div class="sidebar-logo">
        Encom<span>Ventas</span>
        <span class="sidebar-subtitle">Propuestas Comerciales</span>
      </div>

      <div class="nav-section">Principal</div>
      <div class="nav-item ${state.view === 'dashboard' ? 'active' : ''}" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
        ${pendingCount > 0 ? `<span class="nav-badge">${pendingCount}</span>` : ''}
      </div>
      <div class="nav-item ${state.view === 'proposals' ? 'active' : ''}" data-view="proposals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Propuestas
      </div>
      <div class="nav-item ${state.view === 'new-proposal' ? 'active' : ''}" data-view="new-proposal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Nueva propuesta
      </div>
      <div class="nav-item ${state.view === 'clients' ? 'active' : ''}" data-view="clients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clientes
      </div>

      ${isAdmin ? `
        <div class="nav-section">Admin</div>
        <div class="nav-item ${state.view === 'users' ? 'active' : ''}" data-view="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Usuarios
        </div>
      ` : ''}

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <strong>${state.user.name}</strong>
          ${state.user.role === 'admin' ? 'Administrador' : 'Vendedor'}
        </div>
        <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
      </div>
    </div>
  `;
}

// ─── VIEW ROUTER ────────────────────────────────────────
function renderView() {
  switch (state.view) {
    case 'dashboard': return state.user.role === 'admin' ? renderAdminDashboard() : renderVendedorDashboard();
    case 'proposals': return renderProposals();
    case 'new-proposal': return renderNewProposal();
    case 'proposal-detail': return renderProposalDetail();
    case 'clients': return renderClients();
    case 'users': return renderUsers();
    default: return '<p>Vista no encontrada</p>';
  }
}

// ─── ADMIN DASHBOARD ────────────────────────────────────
function renderAdminDashboard() {
  const d = state.dashboard;
  if (!d) return '<div class="loading"><div class="spinner"></div><div class="loading-text">Cargando dashboard...</div></div>';

  const pendingHTML = d.pendingValidation.length > 0 ? `
    <div class="card" style="margin-bottom:24px;border-color:var(--yellow);">
      <div class="card-header">
        <span class="card-title" style="color:var(--yellow);">⚡ Pendientes de tu validación</span>
      </div>
      ${d.pendingValidation.map(p => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);">
          <div>

// ─── PROPOSAL DETAIL ────────────────────────────────────
function renderProposalDetail() {
  const p = state.currentProposal;
  if (!p) return '<div class="loading"><div class="spinner"></div></div>';
  const isAdmin = state.user.role === 'admin';
  const isOwner = p.vendedorId === state.user.id;

  return `
    <div class="page-header">
      <div>
        <div class="page-title">${p.formData.eventName || 'Propuesta'}</div>
        <div class="page-subtitle">${p.clientName || p.clientData?.company || 'Cliente'} · ${statusBadge(p.status)}</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" data-view="proposals">← Volver</button>
        ${p.status === 'generated' && isOwner ? `<button class="btn btn-warning" data-action="request-validation" data-id="${p.id}">Enviar a validación</button>` : ''}
        ${p.status === 'validated' && (isOwner || isAdmin) ? `<button class="btn btn-success" data-action="mark-sent" data-id="${p.id}">Marcar como enviada</button>` : ''}
        ${p.status === 'validated' && (isOwner || isAdmin) ? `<a class="btn btn-primary" href="/api/proposals/${p.id}/pdf?_token=${state.token}" target="_blank">Descargar PDF</a>` : ''}
        ${p.status === 'sent' && isOwner ? `
          <button class="btn btn-success btn-sm" data-action="resolve" data-id="${p.id}" data-resolution="approved">✓ Aprobada</button>
          <button class="btn btn-sm" style="background:var(--red);color:#fff;" data-action="resolve" data-id="${p.id}" data-resolution="rejected">✗ Rechazada</button>
          <button class="btn btn-warning btn-sm" data-action="resolve" data-id="${p.id}" data-resolution="redo">↻ Rehacer</button>
        ` : ''}
      </div>
    </div>

    <!-- Proposal info -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><span class="card-title">Datos del lead</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">
        <div><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Tipo</span><div style="margin-top:4px;">${p.formData.eventType || '-'}</div></div>
        <div><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Fecha</span><div style="margin-top:4px;">${p.formData.eventDate || 'Por determinar'}</div></div>
        <div><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Ubicación</span><div style="margin-top:4px;">${p.formData.location || '-'}</div></div>
        <div><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Asistentes</span><div style="margin-top:4px;">${p.formData.attendees || '-'}</div></div>
        <div><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Presupuesto cliente</span><div style="margin-top:4px;">${p.formData.budget || 'No indicado'}</div></div>
        <div><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Vendedor</span><div style="margin-top:4px;">${p.vendedorName}</div></div>
      </div>
      ${p.formData.objectives ? `<div style="margin-top:16px;"><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Objetivos</span><div style="margin-top:4px;color:var(--text2);font-size:14px;">${p.formData.objectives}</div></div>` : ''}
      ${p.formData.freeContext ? `<div style="margin-top:16px;"><span style="font-size:11px;color:var(--text3);text-transform:uppercase;">Contexto reunión</span><div style="margin-top:4px;color:var(--text2);font-size:14px;">${p.formData.freeContext}</div></div>` : ''}
    </div>

    <!-- Variants -->
    ${p.variants && p.variants.length > 0 ? `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size:20px;font-weight:700;">Propuestas generadas</h2>
        ${['draft','generated','pending_validation'].includes(p.status) && (isOwner || isAdmin) ? `
          <button class="btn btn-secondary btn-sm" data-action="regenerate" data-id="${p.id}">🔄 Regenerar con feedback</button>
        ` : ''}
      </div>
      <div class="variants-grid">
        ${p.variants.map((v, i) => `
          <div class="variant-card ${p.selectedVariantId === v.id ? 'selected' : ''}"
               data-action="${isAdmin && ['pending_validation','generated'].includes(p.status) ? 'select-variant' : ''}"
               data-proposal-id="${p.id}" data-variant-id="${v.id}">
            <div class="variant-tag">Opción ${i + 1}</div>
            ${p.selectedVariantId === v.id ? '<div style="position:absolute;top:16px;left:16px;color:var(--green);font-weight:700;">✓ Seleccionada</div>' : ''}
            <div class="variant-title">${v.title}</div>
            <div class="variant-approach">${v.approach}</div>
            <div class="variant-total">${formatMoney(v.totalClient)} <small>para el cliente</small></div>
            <div class="variant-meta">
              <span>Coste: ${formatMoney(v.totalCost)}</span>
              <span>Margen: ${v.marginPercent || 0}%</span>
              <span>${(v.services || []).length} partidas</span>
            </div>
            <div class="variant-services">
              <table>
                <thead><tr><th>Servicio</th><th style="text-align:right;">Cliente</th><th style="text-align:right;">Coste</th></tr></thead>
                <tbody>
                  ${(v.services || []).map(s => `
                    <tr>
                      <td>${s.name}</td>
                      <td style="text-align:right;">${formatMoney(s.totalClient)}</td>
                      <td style="text-align:right;color:var(--text3);">${formatMoney(s.costInternal)}</td>
                    </tr>

                </tbody>
                <tfoot>
                  <tr style="font-weight:700;border-top:2px solid var(--border);">
                    <td>TOTAL</td>
                    <td style="text-align:right;color:var(--red);">${formatMoney(v.totalClient)}</td>
                    <td style="text-align:right;color:var(--text3);">${formatMoney(v.totalCost)}</td>
                  </tr>
                  <tr>
                    <td style="color:var(--green);font-weight:600;">MARGEN</td>
                    <td colspan="2" style="text-align:right;color:var(--green);font-weight:600;">${formatMoney(v.margin)} (${v.marginPercent}%)</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        `).join('')}
      </div>

      ${isAdmin && ['pending_validation','generated'].includes(p.status) ? `
        <div class="card" style="margin-top:20px;">
          <div class="card-header"><span class="card-title">Validación (Admin)</span></div>
          <div class="form-group">
            <label class="form-label">Notas del admin</label>
            <textarea class="form-textarea" id="admin-notes" placeholder="Notas o comentarios sobre la propuesta...">${p.adminNotes || ''}</textarea>
          </div>
          <div class="btn-group">
            <button class="btn btn-success" data-action="validate" data-id="${p.id}" ${!p.selectedVariantId ? 'disabled title="Selecciona una variante primero"' : ''}>
              ✓ Validar propuesta seleccionada
            </button>
            <button class="btn btn-secondary" data-action="regenerate-admin" data-id="${p.id}">Pedir mejoras a IA</button>
          </div>
        </div>
      ` : ''}
    ` : `
      <div class="card">
        <div class="empty-state">
          <h3>Propuestas aún no generadas</h3>
          <p>Haz clic en "Generar propuestas" para que la IA cree 3 opciones</p>
          <button class="btn btn-primary" style="margin-top:16px;" data-action="generate" data-id="${p.id}">🤖 Generar propuestas con IA</button>
        </div>
      </div>
    `}

    ${p.versions && p.versions.length > 0 ? `
      <div class="card" style="margin-top:20px;">
        <div class="card-header"><span class="card-title">Historial de versiones</span></div>
        ${p.versions.map((v, i) => `
          <div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);">
            Versión ${i + 1} · ${formatDate(v.createdAt)} ${v.feedback ? `· Feedback: "${v.feedback}"` : ''}
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
}

// ─── CLIENTS ────────────────────────────────────────────
function renderClients() {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Clientes</div>
        <div class="page-subtitle">${state.clients.length} clientes registrados</div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Empresa</th><th>Contacto</th><th>Sector</th><th>Email</th><th>Propuestas</th></tr></thead>
          <tbody>
            ${state.clients.map(c => {
              const cProposals = state.proposals.filter(p => p.clientId === c.id);
              return `
                <tr>
                  <td style="font-weight:600;">${c.company}</td>
                  <td>${c.contactName || '-'}</td>
                  <td style="font-size:13px;">${c.sector || '-'}</td>
                  <td style="font-size:13px;color:var(--text2);">${c.contactEmail || '-'}</td>
                  <td><span class="badge badge-generated">${cProposals.length}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
        ${state.clients.length === 0 ? '<div class="empty-state"><h3>Sin clientes</h3><p>Los clientes se crean automáticamente al crear una propuesta</p></div>' : ''}
      </div>
    </div>
  `;
}

// ─── USERS (admin) ──────────────────────────────────────
function renderUsers() {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Usuarios</div>
        <div class="page-subtitle">Gestión de equipo</div>
      </div>
      <button class="btn btn-primary" data-action="show-add-user">+ Nuevo usuario</button>
    </div>
    <div id="add-user-form" style="display:none;" class="card" style="margin-bottom:20px;">
      <div class="card-header"><span class="card-title">Nuevo usuario</span></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="new-user-name"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="new-user-email" type="email"></div>
        <div class="form-group"><label class="form-label">Contraseña</label><input class="form-input" id="new-user-pass" type="password"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Rol</label>
        <select class="form-select" id="new-user-role"><option value="vendedor">Vendedor</option><option value="admin">Admin</option></select>
      </div>
      <button class="btn btn-primary" data-action="create-user">Crear usuario</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Desde</th><th></th></tr></thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
    </div>
  `;
}

// ─── BIND EVENTS ────────────────────────────────────────
function bindEvents() {
  // Login
  const loginForm = document.getElementById('login-form');
  if (loginForm) {
    loginForm.onsubmit = async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('login-error');
      const btn = loginForm.querySelector('button[type="submit"]');
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      errDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      try {
        await login(email, pass);
      } catch (err) {
        // Re-render might have happened, get fresh reference
        const freshErr = document.getElementById('login-error');
        if (freshErr) freshErr.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        const freshBtn = document.querySelector('#login-form button[type="submit"]');
        if (freshBtn) { freshBtn.disabled = false; freshBtn.textContent = 'Iniciar sesión'; }
      }
    };
    return;
  }

  // Logout
  const logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) logoutBtn.onclick = logout;

  // Navigation
  document.querySelectorAll('[data-view]').forEach(el => {
    el.onclick = () => { state.view = el.dataset.view; render(); };
  });

  // Client search
  const searchInput = document.getElementById('client-search');
  if (searchInput) {
    let timeout;
    searchInput.oninput = () => {
      clearTimeout(timeout);
      timeout = setTimeout(async () => {
        const q = searchInput.value.trim();
        if (q.length < 2) { document.getElementById('client-results').innerHTML = ''; return; }
        try {
          const results = await api(`/api/clients-search?q=${encodeURIComponent(q)}`);
          document.getElementById('client-results').innerHTML = results.map(c =>
            `<div style="padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:13px;" data-action="select-client" data-client='${JSON.stringify(c).replace(/'/g, "&#39;")}'>${c.company} ${c.contactName ? '· ' + c.contactName : ''}</div>`
          ).join('') + (results.length === 0 ? '<div style="font-size:12px;color:var(--text3);padding:4px;">Cliente nuevo — se creará automáticamente</div>' : '');
        } catch (e) { console.error(e); }
      }, 300);
    };
  }

  // Select client from search
  document.querySelectorAll('[data-action="select-client"]').forEach(el => {
    el.onclick = () => {
      const c = JSON.parse(el.dataset.client);
      document.getElementById('client-id').value = c.id;
      document.getElementById('f-company').value = c.company;
      document.getElementById('f-contact-name').value = c.contactName || '';
      document.getElementById('f-contact-email').value = c.contactEmail || '';
      document.getElementById('f-contact-phone').value = c.contactPhone || '';
      document.getElementById('f-sector').value = c.sector || '';
      document.getElementById('f-size').value = c.size || '';
      document.getElementById('client-search').value = c.company;
      document.getElementById('client-results').innerHTML = '<div class="alert alert-success" style="padding:8px 12px;font-size:12px;">✓ Cliente seleccionado: ' + c.company + '</div>';
    };
  });

  // Proposal form submit
  const proposalForm = document.getElementById('proposal-form');
  if (proposalForm) {
    proposalForm.onsubmit = async (e) => {
      e.preventDefault();
      await createProposal();
    };
  }

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    if (action === 'select-client') return; // Already handled

    el.onclick = async () => {
      try {
        switch (action) {
          case 'view-proposal': await viewProposal(el.dataset.id); break;
          case 'generate': await generateProposals(el.dataset.id); break;
          case 'regenerate': await regenerateWithFeedback(el.dataset.id, false); break;
          case 'regenerate-admin': await regenerateWithFeedback(el.dataset.id, true); break;
          case 'select-variant': await selectVariant(el.dataset.proposalId, el.dataset.variantId); break;
          case 'validate': await validateProposal(el.dataset.id); break;
          case 'request-validation': await requestValidation(el.dataset.id); break;
          case 'mark-sent': await markSent(el.dataset.id); break;
          case 'resolve': await resolveProposal(el.dataset.id, el.dataset.resolution); break;
          case 'show-add-user': document.getElementById('add-user-form').style.display = 'block'; break;
          case 'create-user': await createUser(); break;
          case 'delete-user': await deleteUser(el.dataset.id); break;
        }
      } catch (err) { alert('Error: ' + err.message); }
    };
  });

  // Load users table if on users view
  if (state.view === 'users') loadUsers();
}

// ─── ACTIONS ────────────────────────────────────────────

async function createProposal() {
  const clientId = document.getElementById('client-id').value;
  let finalClientId = clientId;

  // Create client if new
  if (!finalClientId) {
    const company = document.getElementById('f-company').value.trim();
    if (!company) { alert('Introduce el nombre de la empresa'); return; }
    const client = await api('/api/clients', {
      method: 'POST',
      body: JSON.stringify({
        company,
        contactName: document.getElementById('f-contact-name').value,
        contactEmail: document.getElementById('f-contact-email').value,
        contactPhone: document.getElementById('f-contact-phone').value,
        sector: document.getElementById('f-sector').value,
        size: document.getElementById('f-size').value,
      })
    });
    finalClientId = client.id;
  }

  // Gather services checked
  const services = [];
  document.querySelectorAll('#services-checkboxes .checkbox-label.checked input').forEach(inp => services.push(inp.value));

  const formData = {
    eventType: document.getElementById('f-event-type').value,
    eventName: document.getElementById('f-event-name').value,
    eventDate: document.getElementById('f-event-date').value,
    location: document.getElementById('f-location').value,
    duration: document.getElementById('f-duration').value,
    attendees: document.getElementById('f-attendees').value,
    budget: document.getElementById('f-budget').value,
    objectives: document.getElementById('f-objectives').value,
    targetAudience: document.getElementById('f-target').value,
    specialRequirements: document.getElementById('f-requirements').value,
    servicesInterest: services,
    freeContext: document.getElementById('f-context').value,
  };

  const proposal = await api('/api/proposals', { method: 'POST', body: JSON.stringify({ clientId: finalClientId, formData }) });

  // Now generate with AI
  state.currentProposal = proposal;
  state.view = 'proposal-detail';
  render();

  // Auto-generate
  await generateProposals(proposal.id);
}

async function generateProposals(id) {
  state.loading = true;
  render();

  // Show loading in the detail view
  const main = document.querySelector('.main');
  if (main) {
    main.innerHTML = `
      <div class="loading" style="min-height:60vh;">
        <div class="spinner" style="width:60px;height:60px;border-width:4px;"></div>
        <div class="loading-text" style="font-size:18px;margin-top:24px;">La IA está generando 3 propuestas...</div>
        <div style="color:var(--text3);margin-top:8px;">Esto puede tardar 15-30 segundos</div>
      </div>
    `;
  }

  try {
    const updated = await api(`/api/proposals/${id}/generate`, { method: 'POST', body: JSON.stringify({}) });
    state.currentProposal = updated;
    await loadData();
  } catch (err) {
    alert('Error generando: ' + err.message);
  }
  state.loading = false;
  state.view = 'proposal-detail';
  render();
}

async function viewProposal(id) {
  try {
    state.currentProposal = await api(`/api/proposals/${id}`);
    state.view = 'proposal-detail';
    render();
  } catch (err) { alert('Error: ' + err.message); }
}

async function selectVariant(proposalId, variantId) {
  if (!proposalId || !variantId) return;
  state.currentProposal.selectedVariantId = variantId;
  render();
}

async function validateProposal(id) {
  const selectedId = state.currentProposal?.selectedVariantId;
  if (!selectedId) { alert('Selecciona una variante primero haciendo clic en ella'); return; }
  const notes = document.getElementById('admin-notes')?.value || '';
  const updated = await api(`/api/proposals/${id}`, {
    method: 'PATCH',
    body: JSON.stringify({ status: 'validated', selectedVariantId: selectedId, adminNotes: notes })
  });
  state.currentProposal = updated;
  await loadData();
  render();
}

async function requestValidation(id) {
  if (!confirm('¿Enviar esta propuesta a validación del admin?')) return;
  const updated = await api(`/api/proposals/${id}`, { method: 'PATCH', body: JSON.stringify({ status: 'pending_validation' }) });
  state.currentProposal = updated;
  await loadData();
  render();
}

async function markSent(id) {
  if (!confirm('¿Marcar esta propuesta como enviada al cliente?')) return;
  const updated = await api(`/api/proposals/${id}`, { method: 'PATCH', body: JSON.stringify({ status: 'sent' }) });
  state.currentProposal = updated;
  await loadData();
  render();
}

async function resolveProposal(id, resolution) {
  const labels = { approved: 'aprobada', rejected: 'rechazada', redo: 'rehacer' };
  if (!confirm(`¿Marcar esta propuesta como "${labels[resolution]}"?`)) return;
  const updated = await api(`/api/proposals/${id}`, { method: 'PATCH', body: JSON.stringify({ status: resolution }) });
  state.currentProposal = updated;
  await loadData();
  render();
}

async function regenerateWithFeedback(id, isAdmin) {
  const feedback = prompt('Escribe tu feedback para mejorar las propuestas:');
  if (!feedback) return;

  state.loading = true;
  const main = document.querySelector('.main');
  if (main) {
    main.innerHTML = `
      <div class="loading" style="min-height:60vh;">
        <div class="spinner" style="width:60px;height:60px;border-width:4px;"></div>
        <div class="loading-text" style="font-size:18px;margin-top:24px;">Regenerando propuestas con tu feedback...</div>
      </div>
    `;
  }

  try {
    const updated = await api(`/api/proposals/${id}/generate`, { method: 'POST', body: JSON.stringify({ feedback }) });
    state.currentProposal = updated;
    await loadData();
  } catch (err) { alert('Error: ' + err.message); }
  state.loading = false;
  state.view = 'proposal-detail';
  render();
}

async function loadUsers() {
  try {
    const users = await api('/api/users');
    const tbody = document.getElementById('users-table');
    if (tbody) {
      tbody.innerHTML = users.map(u => `
        <tr>
          <td style="font-weight:500;">${u.name}</td>
          <td style="font-size:13px;">${u.email}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-validated' : 'badge-generated'}">${u.role}</span></td>
          <td style="font-size:13px;color:var(--text3);">${formatDate(u.createdAt)}</td>
          <td>${u.email !== state.user.email ? `<button class="btn btn-sm" style="background:var(--red);color:#fff;font-size:11px;" data-action="delete-user" data-id="${u.id}">Eliminar</button>` : ''}</td>
        </tr>
      `).join('');
      // Re-bind delete buttons
      tbody.querySelectorAll('[data-action="delete-user"]').forEach(el => {
        el.onclick = async () => {
          if (!confirm('¿Eliminar este usuario?')) return;
          await deleteUser(el.dataset.id);
        };
      });
    }
  } catch (e) { console.error(e); }
}

async function createUser() {
  const name = document.getElementById('new-user-name').value;
  const email = document.getElementById('new-user-email').value;
  const password = document.getElementById('new-user-pass').value;
  const role = document.getElementById('new-user-role').value;
  if (!name || !email || !password) { alert('Completa todos los campos'); return; }
  await api('/api/users', { method: 'POST', body: JSON.stringify({ name, email, password, role }) });
  document.getElementById('add-user-form').style.display = 'none';
  loadUsers();
}

async function deleteUser(id) {
  await api(`/api/users/${id}`, { method: 'DELETE' });
  loadUsers();
}

// ─── INIT ───────────────────────────────────────────────
(async () => {
  await checkAuth();
  render();
})();
</script>
</body>
</html>
